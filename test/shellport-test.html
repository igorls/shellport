<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShellPort Test — NanoTermV2 Standalone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 8px 16px;
            background: #15151f;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        header .title {
            font-weight: 600;
            color: #a78bfa;
        }
        header .status {
            color: #71717a;
        }
        header .status.connected { color: #4ade80; }
        header .status.error { color: #ef4444; }
        .controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }
        .controls button {
            background: #27273a;
            border: 1px solid rgba(255,255,255,0.1);
            color: #e4e4e7;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
        }
        .controls button:hover { background: #3a3a52; }
        .controls button:active { background: #4a4a6a; }
        .controls select {
            background: #27273a;
            border: 1px solid rgba(255,255,255,0.1);
            color: #e4e4e7;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .controls .font-size-display {
            font-variant-numeric: tabular-nums;
            min-width: 36px;
            text-align: center;
            color: #a78bfa;
            font-weight: 600;
        }
        .controls label {
            color: #71717a;
            font-size: 12px;
        }
        .controls .separator {
            width: 1px;
            height: 16px;
            background: rgba(255,255,255,0.1);
            margin: 0 4px;
        }
        .cell-info {
            color: #71717a;
            font-size: 11px;
            font-variant-numeric: tabular-nums;
        }
        #terminal-container {
            flex: 1;
            padding: 4px;
            overflow: hidden;
        }
        .term-canvas {
            outline: none;
        }
    </style>
</head>
<body>
    <header>
        <span class="title">🧪 ShellPort Standalone Test</span>
        <span id="renderer" class="status" style="color:#f59e0b;">renderer: ?</span>
        <span id="status" class="status">Connecting…</span>
        <div class="controls">
            <label>Font:</label>
            <button id="font-down" title="Decrease font size (Ctrl+-)">−</button>
            <span id="font-size-display" class="font-size-display">14</span>
            <button id="font-up" title="Increase font size (Ctrl++)">+</button>
            <div class="separator"></div>
            <label>Theme:</label>
            <select id="theme-select">
                <option value="shellport">ShellPort</option>
                <option value="dracula">Dracula</option>
                <option value="catppuccin">Catppuccin Mocha</option>
                <option value="solarized-dark">Solarized Dark</option>
                <option value="gruvbox">Gruvbox Dark</option>
                <option value="tokyonight">Tokyo Night</option>
                <option value="nord">Nord</option>
                <option value="one-dark">One Dark</option>
            </select>
            <div class="separator"></div>
            <span id="cell-info" class="cell-info"></span>
        </div>
    </header>
    <div id="terminal-container"></div>

    <script src="/vendor/nanoterm.js"></script>
    <script>
        // ── Theme Presets ──────────────────────────────────────────────────
        const THEMES = {
            shellport: {
                background: '#0a0a0f',
                foreground: '#e4e4e7',
                cursor: '#a78bfa',
                selection: 'rgba(167, 139, 250, 0.3)',
            },
            dracula: {
                background: '#282a36',
                foreground: '#f8f8f2',
                cursor: '#f8f8f2',
                selection: 'rgba(68, 71, 90, 0.5)',
            },
            catppuccin: {
                background: '#1e1e2e',
                foreground: '#cdd6f4',
                cursor: '#f5e0dc',
                selection: 'rgba(88, 91, 112, 0.4)',
            },
            'solarized-dark': {
                background: '#002b36',
                foreground: '#839496',
                cursor: '#93a1a1',
                selection: 'rgba(7, 54, 66, 0.6)',
            },
            gruvbox: {
                background: '#282828',
                foreground: '#ebdbb2',
                cursor: '#ebdbb2',
                selection: 'rgba(60, 56, 54, 0.5)',
            },
            tokyonight: {
                background: '#1a1b26',
                foreground: '#c0caf5',
                cursor: '#c0caf5',
                selection: 'rgba(41, 46, 66, 0.5)',
            },
            nord: {
                background: '#2e3440',
                foreground: '#d8dee9',
                cursor: '#d8dee9',
                selection: 'rgba(67, 76, 94, 0.5)',
            },
            'one-dark': {
                background: '#282c34',
                foreground: '#abb2bf',
                cursor: '#528bff',
                selection: 'rgba(62, 68, 81, 0.5)',
            },
        };

        // ── State ──────────────────────────────────────────────────────────
        const statusEl = document.getElementById('status');
        const container = document.getElementById('terminal-container');
        const fontSizeDisplay = document.getElementById('font-size-display');
        const cellInfoEl = document.getElementById('cell-info');
        const themeSelect = document.getElementById('theme-select');

        let currentFontSize = 14;
        let currentTheme = 'shellport';
        let term = null;
        let ws = null;

        function updateCellInfo() {
            if (!term) return;
            const cw = term.charWidth?.toFixed(1) || '?';
            const ch = term.charHeight?.toFixed(1) || '?';
            const dpr = window.devicePixelRatio || 1;
            cellInfoEl.textContent = `cell: ${cw}×${ch}px · ${term.cols}×${term.rows} · dpr: ${dpr}`;
        }

        function createTerminal(fontSize) {
            // Destroy previous terminal if exists
            if (term) {
                term.destroy();
                term = null;
            }

            currentFontSize = fontSize;
            fontSizeDisplay.textContent = fontSize;

            term = new NanoTermV2(container, (data) => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                if (typeof data === 'string') {
                    ws.send(new TextEncoder().encode(data));
                } else {
                    ws.send(data);
                }
            }, {
                fontSize,
                cursorBlink: true,
                scrollback: 10000,
                theme: THEMES[currentTheme],
            });

            // Show renderer
            const rendererName = term.renderer?.constructor?.name || 'Unknown';
            const rendererEl = document.getElementById('renderer');
            rendererEl.textContent = 'renderer: ' + rendererName;
            rendererEl.style.color = rendererName.includes('WebGL') ? '#4ade80' : '#f59e0b';

            // Wire resize
            term.onResize = (cols, rows) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols, rows }));
                }
                updateCellInfo();
            };

            if (term.cols && term.rows && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
            }

            updateCellInfo();
            term.canvas.focus();
        }

        function changeFontSize(delta) {
            const newSize = Math.max(8, Math.min(32, currentFontSize + delta));
            if (newSize === currentFontSize) return;
            createTerminal(newSize);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(new TextEncoder().encode('\x0c'));
            }
        }

        // ── Theme switching (live, no state loss) ──
        themeSelect.addEventListener('change', (e) => {
            currentTheme = e.target.value;
            const theme = THEMES[currentTheme];
            if (term && theme) {
                term.setTheme(theme);
                // Also update the page background to match
                document.body.style.background = theme.background;
            }
        });

        // Button controls
        document.getElementById('font-up').addEventListener('click', () => changeFontSize(1));
        document.getElementById('font-down').addEventListener('click', () => changeFontSize(-1));

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === '=' || e.key === '+')) {
                e.preventDefault();
                changeFontSize(1);
            } else if (e.ctrlKey && e.key === '-') {
                e.preventDefault();
                changeFontSize(-1);
            }
        });

        // ── WebSocket Connection ───────────────────────────────────────────
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            statusEl.textContent = '● Connected';
            statusEl.className = 'status connected';
            createTerminal(currentFontSize);
        };

        ws.onmessage = (event) => {
            if (!term) return;
            if (event.data instanceof ArrayBuffer) {
                term.write(new Uint8Array(event.data));
            } else {
                term.write(event.data);
            }
        };

        ws.onclose = () => {
            statusEl.textContent = '● Disconnected';
            statusEl.className = 'status error';
        };

        ws.onerror = () => {
            statusEl.textContent = '● Connection Error';
            statusEl.className = 'status error';
        };
    </script>
</body>
</html>
