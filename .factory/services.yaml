commands:
  install: bun install
  build: bun build ./src/index.ts --compile --minify --bytecode --outfile shellport
  test: bun test
  typecheck: bunx tsc --noEmit
  docs:dev: bunx vitepress dev docs
  docs:build: bunx vitepress build docs
  docs:preview: bunx vitepress preview docs

services:
  docs:
    description: "VitePress documentation dev server"
    start: "cd /home/igorls/dev/GitHub/shellport && bunx vitepress dev docs --port 5173"
    healthcheck: "curl -sf http://localhost:5173/shellport/ > /dev/null"
    stop: "pkill -f 'vitepress dev'"
